name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🔍 TypeScript Type Check
        run: npm run typecheck

  build-and-test:
    name: 🔨 Build & Test (Node ${{ matrix.node-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint-and-typecheck
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        os: [ubuntu-latest]
        # Note: Windows support is best-effort (native .node binary is Linux-only in CI)
        # Add windows-latest below once a Windows native binary is released.

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 🦀 Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: ✅ Verify Build Artifacts
        shell: bash
        run: |
          echo "🔍 Checking required build artifacts..."
          test -f dist/cli.js        && echo "✅ CLI built" || (echo "❌ CLI missing" && exit 1)
          test -f dist/index.js      && echo "✅ API entry built" || (echo "❌ index.js missing" && exit 1)
          test -f dist/index.d.ts    && echo "✅ Type declarations built" || (echo "❌ index.d.ts missing" && exit 1)
          test -f dist/core/universal-transformer.js && echo "✅ Universal Transformer built" || echo "⚠️ Universal Transformer missing"
          test -f dist/nexxo_native.node && echo "✅ Native binary in dist" || echo "⚠️ Native binary not in dist (JS fallback active)"
          echo ""
          echo "📋 Verifying package exports..."
          node --input-type=module --eval "import { CoreBuildEngine, loadConfig, defineConfig } from './dist/index.js'; console.log('✅ Public API exports verified');"

      - name: 🧪 Jest Test Suite (All)
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npm test

      - name: 🧪 Property-Based Tests
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npm run test:property

      - name: 🧪 Load / Stress Tests
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npm run test:load

      - name: 📤 Upload Build Artifacts
        if: matrix.node-version == 20 && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-node${{ matrix.node-version }}
          path: |
            dist/
            nexxo_native.node
          retention-days: 7

  visual-tests:
    name: 🎭 Visual Regression Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🎭 Visual Regression Tests
        run: npm run test:visual

      - name: 📤 Upload Visual Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build-and-test]
    if: always()
    steps:
      - name: 📊 Report Status
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "       NEXXO v1.0.0 — CI COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Lint & Type Check : ${{ needs.lint-and-typecheck.result }}"
          echo "  Build & Test Suite: ${{ needs.build-and-test.result }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  release:
    types: [created]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NPM_FLAGS: '--legacy-peer-deps'

jobs:
  # ─── 1. Type check ──────────────────────────────────────────────────────────
  typecheck:
    name: 🔍 TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci ${{ env.NPM_FLAGS }}

      - name: 🔍 Type check
        run: npm run typecheck

  # ─── 2. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci ${{ env.NPM_FLAGS }}

      - name: 🔍 Lint
        run: npm run lint

  # ─── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🦀 Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 📦 Install dependencies
        run: npm ci ${{ env.NPM_FLAGS }}

      - name: 🔨 Build
        run: npm run build

      - name: ✅ Verify build artifacts
        shell: bash
        run: |
          echo "🔍 Checking required build artifacts..."
          test -f dist/cli.js        && echo "✅ CLI built" || (echo "❌ CLI missing" && exit 1)
          test -f dist/index.js      && echo "✅ API entry built" || (echo "❌ index.js missing" && exit 1)
          test -f dist/index.d.ts    && echo "✅ Type declarations built" || (echo "❌ index.d.ts missing" && exit 1)
          echo ""
          echo "📋 Verifying package exports..."
          node --input-type=module --eval "import { CoreBuildEngine, loadConfig, defineConfig } from './dist/index.js'; console.log('✅ Public API exports verified');"

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─── 4. Unit & Integration tests ────────────────────────────────────────────
  test:
    name: 🧪 Tests (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci ${{ env.NPM_FLAGS }}

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🧪 Run unit tests
        run: npm test
        env:
          NODE_OPTIONS: --experimental-vm-modules
          CI: true

      - name: 🧪 Run federation tests
        run: npm run test:federation
        continue-on-error: true
        env:
          NODE_OPTIONS: --experimental-vm-modules
          CI: true

      - name: 🧪 Run property-based tests
        run: npm run test:property
        continue-on-error: true
        env:
          NODE_OPTIONS: --experimental-vm-modules
          CI: true

      - name: 📤 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            coverage/
            junit.xml
          retention-days: 7

  # ─── 5. Playwright E2E (Linux only) ──────────────────────────────────────────
  test-e2e:
    name: 🎭 E2E Tests
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci ${{ env.NPM_FLAGS }}

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run E2E tests
        run: npm run test:real-world
        env:
          NODE_OPTIONS: --experimental-vm-modules
          CI: true
        timeout-minutes: 15

      - name: 📤 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── 6. Publish to npm (on release only) ────────────────────────────────────
  publish:
    name: 📦 Publish to npm
    needs: [typecheck, lint, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Node.js with npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci ${{ env.NPM_FLAGS }}

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: ✅ Verify build output
        run: |
          test -f dist/cli.js || (echo "❌ dist/cli.js missing" && exit 1)
          test -f dist/index.js || (echo "❌ dist/index.js missing" && exit 1)
          test -f dist/index.d.ts || (echo "❌ dist/index.d.ts missing" && exit 1)
          echo "✅ Build output verified"

      - name: 🚀 Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 📦 Pack for release
        run: npm pack

      - name: 📤 Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: '*.tgz'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 7. CI Summary ──────────────────────────────────────────────────────────
  summary:
    name: 📊 CI Summary
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build, test]
    if: always()
    steps:
      - name: 📊 Report Status
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "       NUCLIE — CI COMPLETE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  TypeScript  : ${{ needs.typecheck.result }}"
          echo "  Lint        : ${{ needs.lint.result }}"
          echo "  Build       : ${{ needs.build.result }}"
          echo "  Tests       : ${{ needs.test.result }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
